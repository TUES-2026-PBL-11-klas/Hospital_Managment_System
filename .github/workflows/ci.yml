name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/medinest-api:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/medinest-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/medinest-web:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/medinest-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Kubernetes image tags
        run: |
          sed -i "s|image: medinest/api:.*|image: ${{ secrets.DOCKER_USERNAME }}/medinest-api:${{ github.sha }}|g" infra/k8s/api-deployment.yaml
          sed -i "s|image: medinest/web:.*|image: ${{ secrets.DOCKER_USERNAME }}/medinest-web:${{ github.sha }}|g" infra/k8s/web-deployment.yaml

      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/api-deployment.yaml infra/k8s/web-deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }} [skip ci]"
          git push
