apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: hospital-system
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: medinest/api:latest
          ports:
            - containerPort: 4000
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:$(POSTGRES_PASSWORD)@postgres:5432/medinest
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medinest-secrets
                  key: postgres-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: medinest-secrets
                  key: jwt-secret
            - name: OLLAMA_URL
              value: http://ollama:11434
            - name: OLLAMA_MODEL
              value: medinest-llama3
          readinessProbe:
            httpGet:
              path: /trpc/auth.me
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /trpc/auth.me
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: '256Mi'
              cpu: '250m'
            limits:
              memory: '512Mi'
              cpu: '500m'

---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: hospital-system
spec:
  selector:
    app: api
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP
